services:
  web:
    build:
      context: ./client/web
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8010
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: ./server
    env_file:
      - ./.env
    environment:
      API_CORS_ORIGINS: http://localhost:3000,http://172.27.32.1:3000
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DATABASE: ai_app
      POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/ai_app
    ports:
      - "8010:8000"
    depends_on:
      mongo:
        condition: service_started
      postgres:
        condition: service_healthy

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_app"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mongo-data:
  postgres-data: